<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Track Explorer (TR CSV)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{font-family:Inter,Arial,sans-serif;background:#0b1220;color:#e5e7eb;margin:0;padding:0}
    .app{display:flex;flex-wrap:wrap;gap:20px;padding:20px;max-width:1400px;margin:auto}
    .sidebar{width:300px;background:#111827;border-radius:12px;padding:16px}
    .main{flex:1;min-width:300px;background:#111827;border-radius:12px;padding:16px}
    .class-item{padding:8px 10px;margin:4px 0;border-radius:8px;background:#1f2937;cursor:pointer}
    .class-item:hover{background:#374151}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
    th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #1f2937}
    th{color:#9ca3af}
    .controls{margin-top:10px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    input,button{padding:6px 8px;border-radius:6px;border:none}
    button{cursor:pointer;background:#2563eb;color:#fff}
    .search{width:100%;margin-bottom:10px}
    canvas{background:#1f2937;border-radius:8px;padding:8px}
    #fileInput{margin-bottom:10px}
    label{font-size:13px;color:#9ca3af}
  </style>
</head>

<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Classes</h2>
    <input id="classFilter" class="search" placeholder="Search classes...">
    <div id="classList"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <h2 id="selectedTitle">Filtered Tracks</h2>

    <div class="controls">
      <input type="file" id="fileInput" accept=".csv" multiple>

      <label for="minCounts">Min counts:</label>
      <input type="number" id="minCounts" value="2" min="0" style="width:80px;">

      <label for="minConf">Min confidence:</label>
      <input type="number" id="minConf" value="50" min="0" max="100" style="width:80px;">

      <button id="showAll">Show All</button>
      <button id="downloadFiltered">Download CSV</button>
    </div>

    <canvas id="summaryChart" height="200"></canvas>

    <input id="tableSearch" class="search" placeholder="Search rows...">

    <table id="dataTable">
      <thead>
        <tr>
          <th>id</th><th>startdate</th><th>starttime</th><th>endtime</th>
          <th>duration</th><th>class</th><th>counts</th><th>confidence</th>
          <th>size</th><th>distance</th><th>alternative</th><th>sourceFile</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>
</div>

<script>
let rows = [];
let selectedClass = null;
let chart = null;
let minCountThreshold = 2;
let minConfThreshold = 50;

// Parse CSV
function parseCSV(text, fileName){
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',');

  const parsed = lines.slice(1).map(line => {
    const parts = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = parts[i]);
    obj.counts = Number(obj.counts);
    obj.confidence = Number(obj.confidence);
    obj.sourceFile = fileName;
    return obj;
  });

  return parsed.filter(r =>
    r.counts >= minCountThreshold &&
    r.confidence >= minConfThreshold
  );
}

function uniqueClasses(){
  const map = new Map();
  rows.forEach(r => {
    if(!map.has(r.class)) map.set(r.class, []);
    map.get(r.class).push(r);
  });
  return map;
}

function renderClassList(){
  const div = document.getElementById('classList');
  div.innerHTML = '';
  const q = document.getElementById('classFilter').value.toLowerCase();

  const map = uniqueClasses();
  const sorted = [...map.keys()].sort((a,b)=>a.localeCompare(b));

  const all = document.createElement('div');
  all.className = 'class-item';
  all.textContent = `All classes (${rows.length})`;
  all.onclick = () => showClass(null);
  div.appendChild(all);

  sorted.forEach(cls => {
    if(cls.toLowerCase().includes(q)){
      const el = document.createElement('div');
      el.className = 'class-item';
      el.textContent = `${cls} (${map.get(cls).length})`;
      el.onclick = () => showClass(cls);
      div.appendChild(el);
    }
  });
}

function renderTable(rset){
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';

  rset.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.id}</td>
      <td>${r.startdate}</td>
      <td>${r.starttime}</td>
      <td>${r.endtime}</td>
      <td>${r.duration}</td>
      <td>${r.class}</td>
      <td>${r.counts}</td>
      <td>${r.confidence}</td>
      <td>${r.size}</td>
      <td>${r.distance}</td>
      <td>${r.alternative}</td>
      <td>${r.sourceFile}</td>`;
    tbody.appendChild(tr);
  });
}

function updateChart(){
  const map = uniqueClasses();
  const labels = [...map.keys()].sort((a,b)=>a.localeCompare(b));
  const data = labels.map(k => map.get(k).reduce((a,b)=>a + b.counts, 0));

  const ctx = document.getElementById('summaryChart').getContext('2d');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Total Counts',
        data
      }]
    },
    options: {
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#e5e7eb'}},
        y:{ticks:{color:'#e5e7eb'}}
      }
    }
  });
}

function showClass(cls){
  selectedClass = cls;
  document.getElementById('selectedTitle').textContent =
    cls ? `Class: ${cls}` :
    `Tracks (≥ ${minCountThreshold} counts, ≥ ${minConfThreshold}% confidence)`;

  const filtered = cls ? rows.filter(r => r.class === cls) : rows;
  renderTable(filtered);
}

function searchTable(){
  const q = document.getElementById('tableSearch').value.toLowerCase();
  let rset = selectedClass ? rows.filter(r => r.class === selectedClass) : rows;

  if(q){
    rset = rset.filter(r => 
      Object.values(r).some(v => String(v).toLowerCase().includes(q))
    );
  }
  renderTable(rset);
}

function downloadCSV(){
  let rset = selectedClass ? rows.filter(r => r.class === selectedClass) : rows;
  if(!rset.length) return;

  const header = Object.keys(rset[0]);
  const lines = [header.join(',')].concat(
    rset.map(r => header.map(h => r[h]).join(','))
  );

  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'filtered.csv';
  a.click();
}

function handleFileUpload(event){
  const files = Array.from(event.target.files);
  const trFiles = files.filter(f => f.name.includes("-TR.csv"));
  const ignored = files.filter(f => !f.name.includes("-TR.csv"));

  if(ignored.length){
    alert(`Ignored ${ignored.length} file(s) not ending with "-TR.csv".`);
  }

  trFiles.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => {
      const newRows = parseCSV(e.target.result, file.name);
      rows = rows.concat(newRows);
      renderClassList();
      showClass(null);
      updateChart();
    };
    reader.readAsText(file);
  });
}

// Update filters
document.getElementById('minCounts').addEventListener('change', e => {
  minCountThreshold = Number(e.target.value);
  rows = [];
  if(chart) chart.destroy();
  document.getElementById('classList').innerHTML = '';
  document.querySelector('#dataTable tbody').innerHTML = '';
  alert(`Min counts updated → re-upload TR files`);
});

document.getElementById('minConf').addEventListener('change', e => {
  minConfThreshold = Number(e.target.value);
  rows = [];
  if(chart) chart.destroy();
  document.getElementById('classList').innerHTML = '';
  document.querySelector('#dataTable tbody').innerHTML = '';
  alert(`Min confidence updated → re-upload TR files`);
});

// Listeners
document.getElementById('fileInput').addEventListener('change', handleFileUpload);
document.getElementById('classFilter').addEventListener('input', renderClassList);
document.getElementById('showAll').addEventListener('click', () => showClass(null));
document.getElementById('tableSearch').addEventListener('input', searchTable);
document.getElementById('downloadFiltered').addEventListener('click', downloadCSV);

</script>
</body>
</html>
