<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Track Explorer (CL CSV)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{font-family:Inter,Arial,sans-serif;background:#0b1220;color:#e5e7eb;margin:0;padding:0}
    .app{display:flex;flex-wrap:wrap;gap:20px;padding:20px;max-width:1600px;margin:auto}
    .sidebar{width:300px;background:#111827;border-radius:12px;padding:16px}
    .main{flex:1;min-width:300px;background:#111827;border-radius:12px;padding:16px}
    .class-item{padding:8px 10px;margin:4px 0;border-radius:8px;background:#1f2937;cursor:pointer}
    .class-item:hover{background:#374151}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
    th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #1f2937;vertical-align:middle}
    th{color:#9ca3af}
    .controls{margin-top:10px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    input,button,select{padding:6px 8px;border-radius:6px;border:none}
    button{cursor:pointer;background:#2563eb;color:#fff}
    .search{width:100%;margin-bottom:10px}
    canvas{background:#1f2937;border-radius:8px;padding:8px}
    #fileInput{margin-bottom:10px}
    label{font-size:13px;color:#9ca3af}
  </style>
</head>

<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Taxa</h2>
    <input id="classFilter" class="search" placeholder="Search taxa...">
    <div id="classList"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <h2 id="selectedTitle">Filter Insect Detections (only detection format of *-CL.csv)</h2>

    <div class="controls">
      <input type="file" id="fileInput" accept=".csv" multiple>

      <label for="sureFilter">taxaSure:</label>
      <select id="sureFilter">
        <option value="any">Any</option>
      </select>

      <button id="showAll">Show All</button>
      <button id="downloadFiltered">Download CSV</button>
    </div>

    <canvas id="summaryChart" height="200"></canvas>

    <input id="tableSearch" class="search" placeholder="Search rows...">

    <table id="dataTable">
      <thead>
        <tr>
          <th>date</th><th>time</th>
          <th>detectConf</th>
          <th>taxaLabel</th><th>taxaLevel</th><th>taxaConf</th><th>taxaSure</th>
	  <th>x1</th><th>y1</th><th>x2</th><th>y2</th>
          <th>trapDir</th><th>fileName</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>
</div>

<script>
let rows = [];
let selectedClass = null;
let chart = null;
let taxaSureFilter = "any";

// Parse CSV
function parseCSV(text, fileName){
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',');

  const parsed = lines.slice(1).map(line => {
    const parts = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = parts[i]);

    obj.taxaConf = Number(obj.taxaConf);
    obj.taxaSure = obj.taxaSure === "True";
    // Convert taxaSure to boolean
    //obj.taxaSure = obj.taxaSure.toLowerCase() === "true"; //KBE???

    obj.sourceFile = fileName;

    return obj;
  });

  return parsed.filter(r =>
    taxaSureFilter === "any" || String(r.taxaSure) === taxaSureFilter
  );
}

function uniqueClasses(){
  const map = new Map();
  rows.forEach(r => {
    if(!map.has(r.taxaLabel)) map.set(r.taxaLabel, []);
    map.get(r.taxaLabel).push(r);
  });
  return map;
}

function renderClassList(){
  const div = document.getElementById('classList');
  div.innerHTML = '';
  const q = document.getElementById('classFilter').value.toLowerCase();

  const map = uniqueClasses();
  //const sorted = [...map.keys()].sort(); KBE???
  const sorted = [...map.keys()].sort((a,b)=>a.localeCompare(b));

  const all = document.createElement('div');
  all.className = 'class-item';
  all.textContent = `All taxa (${rows.length})`;
  all.onclick = () => showClass(null);
  div.appendChild(all);

  sorted.forEach(cls => {
    if(cls.toLowerCase().includes(q)){
      const el = document.createElement('div');
      el.className = 'class-item';
      el.textContent = `${cls} (${map.get(cls).length})`;
      el.onclick = () => showClass(cls);
      div.appendChild(el);
    }
  });
}

function renderTable(rset){
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';

  rset.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.date}</td>
      <td>${r.time}</td>
      <td>${r.detectConf}</td>
      <td>${r.taxaLabel}</td>
      <td>${r.taxaLevel}</td>
      <td>${r.taxaConf}</td>
      <td>${r.taxaSure}</td>
      <td>${r.x1}</td>
      <td>${r.y1}</td>
      <td>${r.x2}</td>
      <td>${r.y2}</td>
      <td>${r.trapDir}</td>
      <td>${r.fileName}</td>`;
    tbody.appendChild(tr);
  });
}

function updateChart(){
  const map = uniqueClasses();
  const labels = [...map.keys()].sort();
  const data = labels.map(k => map.get(k).length);

  const ctx = document.getElementById('summaryChart').getContext('2d');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Detections', data }]
    },
    options: {
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#e5e7eb'}},
        y:{ticks:{color:'#e5e7eb'}}
      }
    }
  });
}

function showClass(cls){
  selectedClass = cls;
  document.getElementById('selectedTitle').textContent =
    cls ? `Taxon: ${cls}` :
    `Filtered Insect Detections`;
  //  `Insect Detections (taxaSure=${taxaSureFilter})`;

  const filtered = cls ? rows.filter(r => r.taxaLabel === cls) : rows; 
  //const filtered = rows.filter(r => r.taxaSure === true);  //KBE???
  renderTable(filtered);
}

function searchTable(){
  const q = document.getElementById('tableSearch').value.toLowerCase();
  let rset = selectedClass ? rows.filter(r => r.taxaLabel === selectedClass) : rows;

  if(q){
    rset = rset.filter(r =>
      Object.values(r).some(v => String(v).toLowerCase().includes(q))
    );
  }
  renderTable(rset);
}

function downloadCSV(){
  let rset = selectedClass ? rows.filter(r => r.taxaLabel === selectedClass) : rows;
  if(!rset.length) return;

  const header = Object.keys(rset[0]);
  const lines = [header.join(',')].concat(
    rset.map(r => header.map(h => r[h]).join(','))
  );

  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'filtered-CL.csv';
  a.click();
}

function handleUpload(event){
  const files = Array.from(event.target.files);
  const clFiles = files.filter(f => f.name.includes("-CL.csv"));
  const ignored = files.filter(f => !f.name.includes("-CL.csv"));

  if(ignored.length){
    alert(`Ignored ${ignored.length} file(s) not ending with "-CL.csv".`);
  }

  clFiles.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => {
      const newRows = parseCSV(e.target.result, file.name);
      rows = rows.concat(newRows);
      renderClassList();
      showClass(null);
      updateChart();
    };
    reader.readAsText(file);
  });
}

document.getElementById('fileInput').addEventListener('change', handleUpload);
document.getElementById('classFilter').addEventListener('input', renderClassList);
document.getElementById('showAll').addEventListener('click', () => showClass(null));
document.getElementById('tableSearch').addEventListener('input', searchTable);
document.getElementById('downloadFiltered').addEventListener('click', downloadCSV);

document.getElementById('sureFilter').addEventListener('change', e => {
  taxaSureFilter = e.target.value;
  rows = [];
  if(chart) chart.destroy();
  document.getElementById('classList').innerHTML = '';
  document.querySelector('#dataTable tbody').innerHTML = '';
  alert(`taxaSure filter updated → re-upload CL files`);
});
</script>

</body>
</html>
